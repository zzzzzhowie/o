<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Open Obsidian note</title>
<style>
  body{font-family:-apple-system,system-ui,sans-serif;margin:0;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       gap:16px;background:#1e1e1e;color:#ddd;padding:24px;text-align:center}
  a.btn{background:#7c3aed;color:#fff;text-decoration:none;padding:14px 28px;
        border-radius:12px;font-size:18px;font-weight:600}
  .path{opacity:.6;font-size:13px;word-break:break-all;max-width:90vw}
</style>
</head>
<body>
  <div>Opening Obsidian…</div>
  <a class="btn" id="go" href="#">👉 Open note</a>
  <div class="path" id="path"></div>
<script>
  // The vault-relative file path lives in the URL hash (everything after # is never
  // sent to the server, so the note path stays private).
  // e.g. https://<user>.github.io/<repo>/#Algorithm%2F(hard)4Sum.md
  var params = new URLSearchParams(location.search);
  var vault = params.get('vault') || 'default';
  var file = decodeURIComponent(location.hash.slice(1) || '');
  var uri = 'obsidian://open?vault=' + encodeURIComponent(vault) +
            '&file=' + encodeURIComponent(file);
  var go = document.getElementById('go');
  go.href = uri;
  document.getElementById('path').textContent = file || '(no file specified)';

  // Close this leftover browser tab once Obsidian has been handed the note.
  // window.close() only works on script-opened tabs; the window.open('','_self')
  // trick covers some in-app browsers (e.g. Telegram) — both are best-effort and
  // silently no-op where the browser forbids self-closing.
  function closeSelf() {
    window.close();
    try { window.open('', '_self'); window.close(); } catch (e) {}
  }

  function launch() {
    location.href = uri;
    // Delay the close so the obsidian:// navigation fires first.
    setTimeout(closeSelf, 600);
  }

  go.addEventListener('click', function () { setTimeout(closeSelf, 600); });

  // Auto-attempt the jump: arriving via a tap counts as a user gesture,
  // so most mobile browsers allow launching the app directly.
  if (file) { launch(); }
</script>
</body>
</html>
