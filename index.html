<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>打开 Obsidian 笔记</title>
<style>
  body{font-family:-apple-system,system-ui,sans-serif;margin:0;min-height:100vh;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       gap:16px;background:#1e1e1e;color:#ddd;padding:24px;text-align:center}
  a.btn{background:#7c3aed;color:#fff;text-decoration:none;padding:14px 28px;
        border-radius:12px;font-size:18px;font-weight:600}
  .path{opacity:.6;font-size:13px;word-break:break-all;max-width:90vw}
</style>
</head>
<body>
  <div>正在打开 Obsidian…</div>
  <a class="btn" id="go" href="#">👉 打开笔记</a>
  <div class="path" id="path"></div>
<script>
  // 相对 vault 根的文件路径放在 URL 的 hash 里（# 之后的内容不会发到服务器，保护隐私）。
  // 例：https://<user>.github.io/<repo>/#Algorithm%2F(难)4Sum.md
  var params = new URLSearchParams(location.search);
  var vault = params.get('vault') || 'default';
  var file = decodeURIComponent(location.hash.slice(1) || '');
  var uri = 'obsidian://open?vault=' + encodeURIComponent(vault) +
            '&file=' + encodeURIComponent(file);
  var go = document.getElementById('go');
  go.href = uri;
  document.getElementById('path').textContent = file || '(未指定文件)';
  // 自动尝试跳转（用户点进来即视为已授权的手势，多数手机浏览器允许直接唤起 App）
  if (file) { location.href = uri; }
</script>
</body>
</html>
